<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenClaw Security — Risk &amp; Mitigation Explorer</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#FFFFFF;
  --surface:#FFFFFF;
  --surface2:#F5F5F5;
  --border:#E8E8E8;
  --border2:#C8C8C8;
  --text:#111111;
  --text2:#555555;
  --text3:#999999;
  --accent:#111111;
  --accent-bg:rgba(17,17,17,.05);
  --c-critical:#DC2626;
  --c-high:#DC2626;
  --c-medium:#D97706;
  --c-low:#16A34A;
  --r:8px;
  --mono:'SF Mono',Menlo,'Cascadia Code','Fira Code',monospace;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue','Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:17px;line-height:1.7}

/* ── HEADER ── */
header{background:#111111;border-bottom:none;position:sticky;top:0;z-index:200}
.hdr{max-width:1200px;margin:0 auto;padding:22px 48px;display:flex;align-items:center;justify-content:space-between;gap:20px}
.brand h1{font-size:26px;font-weight:700;letter-spacing:-.03em;line-height:1.2;color:#FFFFFF}
.brand p{font-size:14px;color:rgba(255,255,255,.5);margin-top:4px}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0}
.hdr-attr{font-size:12px;color:rgba(255,255,255,.45);line-height:1.6;text-align:right}
.hdr-attr a{color:rgba(255,255,255,.45);text-decoration:underline;text-underline-offset:2px}
.hdr-attr a:hover{color:rgba(255,255,255,.75)}
.lang-toggle{display:flex;gap:8px;flex-shrink:0}
.lang-btn{padding:6px 18px;font-size:13px;background:transparent;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.2);border-radius:20px;cursor:pointer;transition:all .15s;font-weight:500;font-family:inherit}
.lang-btn.active{background:#FFFFFF;color:#111111;border-color:#FFFFFF;font-weight:600}
.lang-btn:not(.active):hover{color:rgba(255,255,255,.8);border-color:rgba(255,255,255,.4)}

/* ── MAIN ── */
main{max-width:1200px;margin:0 auto;padding:52px 48px}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:44px}
.tab-btn{padding:13px 28px;font-size:16px;font-weight:500;background:none;border:none;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .15s,border-color .15s;font-family:inherit;letter-spacing:-.01em}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);font-weight:700}
.tab-btn:not(.active):hover{color:var(--text2)}

/* ── VIEWS ── */
.view{display:none}.view.active{display:block}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:36px}
.fpill{padding:8px 20px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.fpill:hover{border-color:var(--text);color:var(--text)}
.fpill.active{border-color:var(--text);background:var(--text);color:var(--bg)}

/* ── SECTION HEADERS ── */
.sechdr{display:flex;align-items:center;gap:14px;margin:44px 0 20px}
.sechdr:first-child{margin-top:0}
.secline{flex:1;height:1px;background:var(--border)}
.secbadge{font-size:12px;letter-spacing:.06em;text-transform:uppercase;padding:0 2px;white-space:nowrap;font-weight:600;color:var(--text3);display:flex;align-items:center;gap:7px}
.secbadge::before{content:'';display:inline-block;width:8px;height:8px;border-radius:50%;flex-shrink:0}
.secbadge.critical::before{background:var(--c-critical)}
.secbadge.high::before{background:var(--c-high)}
.secbadge.medium::before{background:var(--c-medium)}
.secbadge.low::before{background:var(--c-low)}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-left-width:3px;border-left-color:var(--border);border-radius:var(--r);margin-bottom:10px;transition:border-color .15s;overflow:hidden}
.card.critical{border-left-color:var(--c-critical)}
.card.high{border-left-color:var(--c-high)}
.card.medium{border-left-color:var(--c-medium)}
.card.low{border-left-color:var(--c-low)}
/* ── MITIGATION SEVERITY COLOR OVERRIDES (critical→red, high→amber, medium→green) ── */
#viewMits .card.high{border-left-color:#D97706}
#viewMits .card.medium{border-left-color:#16A34A}
#viewMits .secbadge.high::before{background:#D97706}
#viewMits .secbadge.medium::before{background:#16A34A}
/* Detail panel when showing a mitigation */
.detail-panel.is-mit .dp-badge.high{color:#D97706;border-color:rgba(217,119,6,.35)}
.detail-panel.is-mit .dp-badge.medium{color:#16A34A;border-color:rgba(22,163,74,.35)}
.card:hover{border-color:var(--border2);border-left-width:3px}
.card.highlighted{box-shadow:0 0 0 2px var(--text);border-color:var(--text)!important}
.card-trigger{width:100%;display:flex;align-items:flex-start;gap:18px;padding:20px 24px;cursor:pointer;background:none;border:none;color:inherit;text-align:left;font-family:inherit;transition:background .1s}
.card-trigger:hover{background:var(--surface2)}
.card-num{font-family:var(--mono);font-size:12px;color:var(--text3);width:32px;flex-shrink:0;padding-top:3px;text-align:right;font-weight:600}
.card-main{flex:1;min-width:0}
.card-title{font-size:16px;font-weight:650;letter-spacing:-.02em;margin-bottom:9px;line-height:1.4}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.who-tag{font-size:12px;padding:4px 12px;border-radius:20px;white-space:nowrap;font-weight:500;border:1px solid var(--border2);color:var(--text3);background:transparent}
.chevron{color:var(--text3);font-size:11px;transition:transform .2s;flex-shrink:0;margin-top:5px}
.card.open .chevron{transform:rotate(180deg)}
.card-body{max-height:0;overflow:hidden;transition:max-height .3s cubic-bezier(.4,0,.2,1)}
.card.open .card-body{max-height:1200px}
.card-body-inner{padding:0 24px 24px 74px;font-size:15px;line-height:1.85;color:var(--text2)}
.card-body-inner p{margin-bottom:10px}
.card-body-inner p:last-child{margin-bottom:0}
.card-body-inner code{font-family:var(--mono);font-size:13px;background:var(--surface2);color:var(--text2);padding:2px 7px;border-radius:4px;border:1px solid var(--border)}

/* ── MAP PILLS ── */
.map-row{margin-top:18px;padding-top:18px;border-top:1px solid var(--border);display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.map-lbl{font-size:12px;color:var(--text3);letter-spacing:.04em;text-transform:uppercase;margin-right:4px;font-weight:500}
.map-pill{font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all .15s;white-space:nowrap}
.map-pill:hover{border-color:var(--text);color:var(--text)}


.empty{text-align:center;padding:4rem 0;font-size:15px;color:var(--text3)}

/* ── MAP VIEW ── */
.map-intro{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:24px}
.map-intro-text h2{font-size:20px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px}
.map-intro-text p{font-size:13px;color:var(--text3)}
.map-sev-legend{display:flex;gap:16px;flex-wrap:wrap}
.sev-chip{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text3)}
.sev-dot{width:8px;height:8px;border-radius:50%}

.map-wrap{position:relative;display:flex;align-items:stretch;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);min-height:480px}
.map-col-risks{flex:0 0 38%;display:flex;flex-direction:column;justify-content:space-between;gap:6px;padding:24px 16px}
.map-col-center{flex:1;pointer-events:none}
.map-col-mits{flex:0 0 38%;display:flex;flex-direction:column;justify-content:space-between;gap:6px;padding:24px 16px}
.map-col-hdr{font-size:12px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);font-weight:600;text-align:center;padding-bottom:12px;border-bottom:1px solid var(--border);margin-bottom:12px;flex-shrink:0}

.mnode{display:flex;align-items:center;gap:12px;padding:7px 12px;border-radius:7px;border:1px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg);user-select:none;min-height:36px}
.mnode:hover{border-color:var(--border2);background:var(--surface2)}
.mnode.active{border-color:var(--text)!important;background:var(--accent-bg)!important}
.mnode.connected{border-color:var(--border2);background:var(--surface2)}
.mnode.dimmed{opacity:.2}
.mnode-id{font-family:var(--mono);font-size:13px;font-weight:700;padding:3px 8px;border-radius:4px;flex-shrink:0;letter-spacing:.02em;white-space:nowrap;border:1px solid var(--border);color:var(--text3);background:transparent}
.mnode-id.critical{color:var(--c-critical);border-color:rgba(220,38,38,.35)}
.mnode-id.high{color:var(--c-high);border-color:rgba(220,38,38,.35)}
.mnode-id.medium{color:var(--c-medium);border-color:rgba(217,119,6,.35)}
.mnode-id.low{color:var(--c-low);border-color:rgba(22,163,74,.35)}
.mnode-id.mit{color:var(--text2);border-color:var(--border)}
.mnode-id.mit.critical{color:#DC2626;border-color:rgba(220,38,38,.35)}
.mnode-id.mit.high{color:#D97706;border-color:rgba(217,119,6,.35)}
.mnode-id.mit.medium{color:#16A34A;border-color:rgba(22,163,74,.35)}
.mnode-id.mit.low{color:#16A34A;border-color:rgba(22,163,74,.35)}
.mnode-title{font-size:14px;font-weight:500;line-height:1.35;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.mnode.active .mnode-title,.mnode.connected .mnode-title{color:var(--text)}

#mapSvg{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
.conn-line{transition:opacity .2s ease,stroke-width .2s ease;stroke-linecap:round}

/* ── MAP TOOLTIP ── */
.map-tooltip{position:fixed;z-index:200;background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;width:260px;box-shadow:0 6px 24px rgba(0,0,0,.11);pointer-events:none;opacity:0;transition:opacity .12s ease}
.map-tooltip.visible{opacity:1}
/* arrow pointing left (tooltip is to the right of node) */
.map-tooltip.arrow-left::before{content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);border:8px solid transparent;border-right-color:var(--border)}
.map-tooltip.arrow-left::after{content:'';position:absolute;right:calc(100% - 1px);top:50%;transform:translateY(-50%);border:7px solid transparent;border-right-color:#fff}
/* arrow pointing right (tooltip is to the left of node) */
.map-tooltip.arrow-right::before{content:'';position:absolute;left:100%;top:50%;transform:translateY(-50%);border:8px solid transparent;border-left-color:var(--border)}
.map-tooltip.arrow-right::after{content:'';position:absolute;left:calc(100% - 1px);top:50%;transform:translateY(-50%);border:7px solid transparent;border-left-color:#fff}
.mtt-id{font-family:var(--mono);font-size:11px;font-weight:700;margin-bottom:5px}
.mtt-id.critical,.mtt-id.high{color:var(--c-high)}
.mtt-id.medium{color:var(--c-medium)}
.mtt-id.low{color:var(--c-low)}
.mtt-id.mit-critical{color:#DC2626}
.mtt-id.mit-high{color:#D97706}
.mtt-id.mit-medium{color:#16A34A}
.mtt-id.mit-low{color:#16A34A}
.mtt-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.35;margin-bottom:7px}
.mtt-body{font-size:12px;color:var(--text2);line-height:1.65}
.mtt-body p{margin-bottom:5px}.mtt-body p:last-child{margin-bottom:0}
.mtt-body code{font-family:var(--mono);font-size:11px;background:var(--surface2);color:var(--text2);padding:1px 5px;border-radius:3px;border:1px solid var(--border)}
.dp-link-pill{font-size:12px;padding:5px 14px;border-radius:20px;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all .15s;white-space:nowrap}
.dp-link-pill:hover{border-color:var(--text);color:var(--text)}

.map-hint{text-align:center;font-size:13px;color:var(--text3);margin-top:14px}

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */

/* ── Tablet (641–900px) ── */
@media(min-width:641px) and (max-width:900px){
  .hdr{padding:18px 32px}
  main{padding:40px 32px}
  .tab-btn{padding:12px 22px;font-size:15px}
  .map-col-risks,.map-col-mits{flex:0 0 42%}
  .card-body-inner{padding:0 20px 20px 62px}
}

/* ── Mobile (≤640px) ── */
@media(max-width:640px){

  /* Header */
  .hdr{padding:18px 24px;gap:12px;flex-wrap:nowrap}
  .brand h1{font-size:17px}
  .brand p{font-size:12px}
  .lang-btn{padding:5px 13px;font-size:12px}

  /* Main — generous top/bottom, comfortable sides */
  main{padding:40px 24px 56px}

  /* Tabs — horizontally scrollable, no scrollbar */
  .tabs{overflow-x:auto;-webkit-overflow-scrolling:touch;white-space:nowrap;scrollbar-width:none;flex-wrap:nowrap;margin-bottom:36px;-ms-overflow-style:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab-btn{padding:12px 20px;font-size:15px;flex-shrink:0}

  /* Filter pills */
  .filter-bar{gap:8px;margin-bottom:28px}
  .fpill{padding:7px 16px;font-size:13px}

  /* Section headers */
  .sechdr{margin:36px 0 16px}

  /* Cards — remove big left indent, keep generous padding */
  .card{margin-bottom:10px;border-radius:8px}
  .card-trigger{padding:18px 18px;gap:12px}
  .card-num{width:28px;font-size:11px}
  .card-title{font-size:15px;margin-bottom:8px}
  .card-body-inner{padding:0 18px 20px 18px;font-size:14px;line-height:1.8}
  .who-tag{font-size:12px;padding:4px 11px}

  /* Map pills inside card body */
  .map-row{margin-top:16px;padding-top:16px}

  /* ── Map view: stack columns vertically ── */
  .map-intro{flex-direction:column;align-items:flex-start;gap:12px;margin-bottom:20px}
  .map-intro-text h2{font-size:18px}
  .map-sev-legend{gap:12px}
  .sev-chip{font-size:13px}

  .map-wrap{flex-direction:column;min-height:unset;border-radius:6px}
  .map-col-risks{flex:none;width:100%;padding:16px 14px;border-bottom:1px solid var(--border)}
  .map-col-center{display:none}
  .map-col-mits{flex:none;width:100%;padding:16px 14px}
  #mapSvg{display:none}

  /* Map column header */
  .map-col-hdr{font-size:10px;margin-bottom:10px;padding-bottom:8px}

  /* Map nodes — let title wrap on small screens */
  .map-col-risks{flex:none;width:100%;padding:20px 18px;border-bottom:1px solid var(--border)}
  .map-col-mits{flex:none;width:100%;padding:20px 18px}
  .mnode{min-height:auto;align-items:flex-start;padding:10px 12px}
  .mnode-title{white-space:normal;overflow:visible;text-overflow:unset;font-size:13px;line-height:1.45}

  /* Detail panel */
  .detail-panel{padding:20px;margin-top:16px}
  .dp-title{font-size:16px}
  .dp-body{font-size:14px;line-height:1.8}
  .dp-links{gap:6px;margin-top:16px;padding-top:16px}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="brand">
      <h1 id="hTitle">OpenClaw Security</h1>
      <p id="hSub">Risk &amp; Mitigation Explorer</p>
    </div>
    <div class="hdr-right">
      <div class="hdr-attr" id="hdrAttr"></div>
      <div class="lang-toggle">
        <button id="btnEn" class="lang-btn active" onclick="setLang('en')">EN</button>
        <button id="btnZh" class="lang-btn" onclick="setLang('zh')">中文</button>
      </div>
    </div>
  </div>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn active" id="tabMap" onclick="setTab('map')"></button>
    <button class="tab-btn" id="tabRisks" onclick="setTab('risks')"></button>
    <button class="tab-btn" id="tabMits" onclick="setTab('mits')"></button>
  </div>

  <!-- RISKS VIEW -->
  <div id="viewRisks" class="view">
    <div class="filter-bar" id="risksFilters"></div>
    <div id="risksList"></div>
  </div>

  <!-- MITIGATIONS VIEW -->
  <div id="viewMits" class="view">
    <div class="filter-bar" id="mitsFilters"></div>
    <div id="mitsList"></div>
  </div>

  <!-- MAP VIEW -->
  <div id="viewMap" class="view active">
    <div class="map-intro">
      <div class="map-intro-text">
        <h2 id="mapTitle"></h2>
        <p id="mapSub"></p>
      </div>
      <div class="map-sev-legend">
        <div class="sev-chip"><span class="sev-dot" style="background:var(--c-high)"></span><span id="slHigh"></span></div>
        <div class="sev-chip"><span class="sev-dot" style="background:var(--c-medium)"></span><span id="slMed"></span></div>
        <div class="sev-chip"><span class="sev-dot" style="background:var(--c-low)"></span><span id="slLow"></span></div>
      </div>
    </div>

    <div class="map-wrap" id="mapWrap">
      <div class="map-col-risks" id="mapColRisks">
        <div class="map-col-hdr" id="mapHdrRisks"></div>
      </div>
      <div class="map-col-center"></div>
      <svg id="mapSvg" aria-hidden="true"></svg>
      <div class="map-col-mits" id="mapColMits">
        <div class="map-col-hdr" id="mapHdrMits"></div>
      </div>
    </div>

    <p class="map-hint" id="mapHint"></p>
  </div>
</main>

<script>
/* ════════════ DATA ════════════ */
var RISKS = [
  { n:'R1', sev:'high', who:['local','exposed','cloud'],
    en:{ title:'Prompt injection', summary:'Malicious instructions hidden in emails, webpages, or files trick the agent into ignoring your rules and executing an attacker\'s commands instead.', fixes:['M3','M5','M8'] },
    zh:{ title:'Prompt injection（提示注入）', summary:'攻击者在 Agent 读取的邮件、网页或文件中隐藏恶意指令，诱使 Agent 无视你的规则，转而执行攻击者的命令。', fixes:['M3','M5','M8'] }},
  { n:'R2', sev:'high', who:['local','exposed'],
    en:{ title:'Malicious skills (supply chain attack)', summary:'Compromised skills in ClawHub install keyloggers, malware, or data-exfiltration tools under the cover of legitimate-sounding names. ~12% of ClawHub was found malicious at peak.', fixes:['M2','M8'] },
    zh:{ title:'恶意 skill（供应链攻击）', summary:'ClawHub 上被植入恶意代码的 skill 以合法名称为掩护，安装键盘记录器、恶意软件或数据窃取工具。高峰时期约 12% 的 ClawHub 内容为恶意。', fixes:['M2','M8'] }},
  { n:'R3', sev:'high', who:['exposed'],
    en:{ title:'Exposed Gateway (zero-auth public access)', summary:'Gateway instances left open on the internet with no authentication. Over 135,000 instances found exposed. Anyone who finds the port can issue commands directly to your agent.', fixes:['M4'] },
    zh:{ title:'Gateway 裸奔（零身份验证公网暴露）', summary:'Gateway 在没有任何身份验证的情况下暴露在公网上。超过 135,000 个实例被发现裸奔。任何人找到端口就能直接向你的 Agent 发送指令。', fixes:['M4'] }},
  { n:'R4', sev:'high', who:['local','exposed'],
    en:{ title:'One-click RCE via malicious webpage (CVE-2026-25253)', summary:'A critical vulnerability (CVSS 8.8) allowed any website to silently connect to your local Gateway via WebSocket and gain full device control — no interaction required.', fixes:['M1','M10'] },
    zh:{ title:'恶意网页一键远程代码执行（CVE-2026-25253）', summary:'一个严重漏洞（CVSS 8.8）允许任何网站通过 WebSocket 静默连接到你的本地 Gateway，无需任何用户交互即可获得设备完全控制权。', fixes:['M1','M10'] }},
  { n:'R5', sev:'medium', who:['local','exposed'],
    en:{ title:'Privilege escalation via admin account', summary:'Running OpenClaw under an admin account means a compromised agent can install software, modify system files, and access all users\' data on the machine.', fixes:['M7'] },
    zh:{ title:'管理员账户权限提升', summary:'在管理员账户下运行 OpenClaw 意味着一旦 Agent 被入侵，攻击者可以安装软件、修改系统文件并访问机器上所有用户的数据。', fixes:['M7'] }},
  { n:'R6', sev:'medium', who:['local','exposed'],
    en:{ title:'Credential and API key leakage', summary:'OpenClaw has leaked plaintext API keys and credentials via prompt injection or unsecured endpoints. Keys stored in env files with loose permissions are also at risk.', fixes:['M8'] },
    zh:{ title:'凭证和 API key 泄露', summary:'OpenClaw 曾通过 prompt injection 或不安全的端点泄露明文 API key 和凭证。存储在权限配置过于宽松的 env 文件中的 key 同样面临风险。', fixes:['M8'] }},
  { n:'R7', sev:'medium', who:['local','exposed'],
    en:{ title:'Runaway agentic behavior', summary:'Without human-in-the-loop controls, the agent can autonomously delete files, send emails, execute destructive commands, or take irreversible actions based on misinterpreted instructions.', fixes:['M3','M8'] },

var lang='en', tab='map', filterR='all', filterM='all';
var openCards=new Set();

/* ════════════ UTILS ════════════ */
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderBody(text){
  return text.split('\n').map(function(line){
    var t=line.trim(); if(!t) return '';
    var s=esc(t);
    CODE_TERMS.forEach(function(c){ s=s.split(esc(c)).join('<code>'+esc(c)+'</code>'); });
    return '<p>'+s+'</p>';
  }).join('');
}

function getRiskConns(rId){ var r=[]; CONNS.forEach(function(k){ var p=k.split('|'); if(p[0]===rId) r.push(p[1]); }); return r; }
function getMitConns(mId){ var r=[]; CONNS.forEach(function(k){ var p=k.split('|'); if(p[1]===mId) r.push(p[0]); }); return r; }

/* ════════════ TAB / LANG ════════════ */
function setLang(l){
  lang=l;
  document.getElementById('btnEn').classList.toggle('active',l==='en');
  document.getElementById('btnZh').classList.toggle('active',l==='zh');
  document.documentElement.lang=l==='zh'?'zh-CN':'en';
  renderAll();
}

function setTab(t){
  tab=t; openCards.clear(); activeNode=null;
  ['risks','mits','map'].forEach(function(v){
    document.getElementById('view'+v.charAt(0).toUpperCase()+v.slice(1)).classList.toggle('active',v===t);
    document.getElementById('tab'+v.charAt(0).toUpperCase()+v.slice(1)).classList.toggle('active',v===t);
  });
  renderAll();
  if(t==='map') requestAnimationFrame(function(){ requestAnimationFrame(drawLines); });
}

function setFilterR(f){ filterR=f; renderRisks(); }
function setFilterM(f){ filterM=f; renderMits(); }

/* ════════════ RENDER HELPERS ════════════ */
function renderCards(data, listEl, filterVal, isRisk){
  var L=LABELS[lang];
  var groups={critical:[],high:[],medium:[],low:[]};
  data.forEach(function(item){
    if(filterVal==='all'||item.who.indexOf(filterVal)!==-1) groups[item.sev].push(item);
  });

  var html='';
  ['critical','high','medium','low'].forEach(function(sev){
    if(!groups[sev].length) return;
    var displaySev=isRisk?sev:({critical:'high',high:'medium',medium:'low',low:'low'}[sev]);
    html+='<div class="sechdr"><div class="secline"></div><span class="secbadge '+sev+'">'+L.sev[displaySev]+' '+L.pri+'</span><div class="secline"></div></div>';
    groups[sev].forEach(function(item){
      var d=item[lang];
      var isOpen=openCards.has(item.n);
      var whoHTML=item.who.map(function(w){ return '<span class="who-tag '+w+'">'+esc(L.who[w])+'</span>'; }).join('');
      var mapLabel=isRisk?L.mitigatedBy:L.addressedBy;
      var fixes=d.fixes||item.en.fixes;
      var targetTab=isRisk?'mits':'risks';
      var mapHTML='<div class="map-row"><span class="map-lbl">'+esc(mapLabel)+'</span>'+
        fixes.map(function(ref){ return '<button class="map-pill" onclick="jumpTo(\''+targetTab+'\',\''+ref+'\')">'+esc(ref)+'</button>'; }).join('')+'</div>';
      var bodyContent=isRisk?'<p>'+esc(d.summary)+'</p>':renderBody(d.body);
      html+='<div class="card '+item.sev+(isOpen?' open':'')+('" data-n="'+item.n+'">')+
        '<button class="card-trigger" onclick="toggleCard(\''+item.n+'\')">'  +
          '<span class="card-num">'+esc(item.n)+'</span>'+
          '<div class="card-main">'+
            '<div class="card-title">'+esc(d.title)+'</div>'+
            '<div class="card-meta">'+whoHTML+'</div>'+
          '</div>'+
          '<span class="chevron">▾</span>'+
        '</button>'+
        '<div class="card-body"><div class="card-body-inner">'+bodyContent+mapHTML+'</div></div>'+
        '</div>';
    });
  });
  if(!html) html='<div class="empty">'+esc(L.noItems)+'</div>';
  listEl.innerHTML=html;
}


function renderFilters(el, filterVal, setFn){
  var L=LABELS[lang];
  el.innerHTML=L.fkeys.map(function(f,i){
    return '<button class="fpill'+(filterVal===f?' active':'')+'" onclick="'+setFn+'(\''+f+'\')">'+esc(L.filters[i])+'</button>';
  }).join('');
}

/* ════════════ RENDER RISKS ════════════ */

/* ════════════ MAP SVG LINES ════════════ */
function drawLines(){
  var wrap=document.getElementById('mapWrap');
  var svg=document.getElementById('mapSvg');
  if(!wrap||!svg) return;
  svg.innerHTML='';

  var wRect=wrap.getBoundingClientRect();
  if(!wRect.width) return;

  svg.setAttribute('width',wRect.width);
  svg.setAttribute('height',wRect.height);
  svg.setAttribute('viewBox','0 0 '+wRect.width+' '+wRect.height);

  // Gather node centers
  var rPos={},mPos={};
  document.querySelectorAll('#mapColRisks .mnode').forEach(function(el){
    var r=el.getBoundingClientRect();
    rPos[el.dataset.id]={ x:r.right-wRect.left, y:(r.top+r.bottom)/2-wRect.top };
  });
  document.querySelectorAll('#mapColMits .mnode').forEach(function(el){
    var r=el.getBoundingClientRect();
    mPos[el.dataset.id]={ x:r.left-wRect.left, y:(r.top+r.bottom)/2-wRect.top };
  });

  CONNS.forEach(function(key){
    var p=key.split('|');
    var rId=p[0],mId=p[1];
    if(!rPos[rId]||!mPos[mId]) return;
    var r=rPos[rId],m=mPos[mId];
    var dx=(m.x-r.x)*0.5;

    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.setAttribute('d','M '+r.x+' '+r.y+' C '+(r.x+dx)+' '+r.y+','+(m.x-dx)+' '+m.y+','+m.x+' '+m.y);
    path.setAttribute('fill','none');
    path.setAttribute('stroke','#C0C0C0');
    path.setAttribute('stroke-width','1.5');
    path.setAttribute('class','conn-line');
    path.style.opacity='0.5';
    path.dataset.risk=rId;
    path.dataset.mit=mId;
    svg.appendChild(path);
  });
}

/* ════════════ MAP INTERACTION ════════════ */
function selectNode(id,type){
  if(activeNode&&activeNode.id===id){
    // Deselect
    activeNode=null;
    clearHighlight();
    return;
  }
  activeNode={id:id,type:type};

  var connected=new Set();
  if(type==='risk'){ getRiskConns(id).forEach(function(m){connected.add(m);}); }
  else { getMitConns(id).forEach(function(r){connected.add(r);}); }

  // Update nodes
  document.querySelectorAll('.mnode').forEach(function(el){
    var elId=el.dataset.id;
    var isActive=elId===id;
    var isConn=connected.has(elId);
    el.classList.toggle('active',isActive);
    el.classList.toggle('connected',!isActive&&isConn);
    el.classList.toggle('dimmed',!isActive&&!isConn);
  });

  // Ensure lines exist (lazy init if drawLines missed its timing window)
  if(!document.querySelector('.conn-line')) drawLines();

  // Update lines
  document.querySelectorAll('.conn-line').forEach(function(line){
    var lR=line.dataset.risk,lM=line.dataset.mit;
    var isActive=(type==='risk'&&lR===id)||(type==='mit'&&lM===id);
    line.style.opacity=isActive?'0.85':'0.05';
    line.setAttribute('stroke-width',isActive?'2.5':'1.5');
    if(isActive){
      var r=RISKS.find(function(x){return x.n===lR;});
      line.setAttribute('stroke',SEV_COLORS[r?r.sev:'low']);
    } else {
      line.setAttribute('stroke','#C0C0C0');
    }
  });

}


function clearHighlight(){
  document.querySelectorAll('.mnode').forEach(function(el){
    el.classList.remove('active','connected','dimmed');
  });
  document.querySelectorAll('.conn-line').forEach(function(line){
    line.style.opacity='0.5';
    line.setAttribute('stroke','#C0C0C0');
    line.setAttribute('stroke-width','1.5');
  });
}

var _tt=null;
function showMapTooltip(id,type,nodeEl){
  var item=type==='risk'?RISKS.find(function(x){return x.n===id;}):MITS.find(function(x){return x.n===id;});
  if(!item) return;
  var d=item[lang];
  var bodyText=type==='risk'?renderBody(d.summary):renderBody(d.body);
  if(!_tt){
    _tt=document.createElement('div');
    _tt.className='map-tooltip';
    _tt.innerHTML='<div class="mtt-id"></div><div class="mtt-title"></div><div class="mtt-body"></div>';
    document.body.appendChild(_tt);
  }
  var idCls=type==='mit'?('mit-'+item.sev):item.sev;
  _tt.querySelector('.mtt-id').className='mtt-id '+idCls;
  _tt.querySelector('.mtt-id').textContent=id;
  _tt.querySelector('.mtt-title').textContent=d.title;
  _tt.querySelector('.mtt-body').innerHTML=bodyText;

  var nr=nodeEl.getBoundingClientRect();
  var MARGIN=12,TW=260;
  var top=nr.top+nr.height/2;
  var left,right;
  var arrowCls;
  if(type==='risk'){
    left=nr.right+MARGIN;
    if(left+TW>window.innerWidth){ left=nr.left-TW-MARGIN; arrowCls='arrow-right'; }
    else { arrowCls='arrow-left'; }
  } else {
    left=nr.left-TW-MARGIN;
    if(left<0){ left=nr.right+MARGIN; arrowCls='arrow-left'; }
    else { arrowCls='arrow-right'; }
  }
  _tt.className='map-tooltip '+arrowCls;
  _tt.style.top=top+'px';
  _tt.style.left=left+'px';
  _tt.style.transform='translateY(-50%)';
  _tt.classList.add('visible');
}
function hideMapTooltip(){
  if(_tt) _tt.classList.remove('visible');
}

/* ════════════ CARD TOGGLE ════════════ */
function toggleCard(n){
  if(openCards.has(n)) openCards.delete(n); else openCards.add(n);
  var el=document.querySelector('.card[data-n="'+n+'"]');
  if(el) el.classList.toggle('open',openCards.has(n));
}

/* ════════════ JUMP TO ════════════ */
function jumpTo(targetTab,n){
  setTab(targetTab);
  openCards.add(n);
  if(targetTab==='risks') renderRisks(); else renderMits();
  setTimeout(function(){
    var el=document.querySelector('.card[data-n="'+n+'"]');
    if(el){
      el.classList.add('open');
      el.classList.add('highlighted');
      el.scrollIntoView({behavior:'smooth',block:'center'});
      setTimeout(function(){el.classList.remove('highlighted');},2000);
    }
  },60);
}

/* ════════════ RESIZE ════════════ */
var resizeTimer;
window.addEventListener('resize',function(){
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(function(){ if(tab==='map') drawLines(); },100);
});

/* ════════════ INIT ════════════ */
renderAll();
</script>
</body>
